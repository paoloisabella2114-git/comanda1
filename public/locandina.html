<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locandina dell'Evento - Sagra</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .container-locandina {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 15px;
            text-align: center;
        }
        .locandina-img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .btn-torna {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="container-locandina">
        <h1>Locandina dell'Evento</h1>
        <!-- Modifica il nome del file immagine con quello reale della tua locandina -->
        <img src="img/locandina.jpg" alt="Locandina Sagra" class="locandina-img">
        
        <br>
        <a href="index.html" class="btn-torna">← Torna al Menu</a>
    </div>

</body>
</html>
