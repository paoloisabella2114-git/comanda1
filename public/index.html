<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benvenuti alla Sagra!</title>
    <!-- Riutilizziamo i tuoi stili globali se necessario -->
    <link rel="stylesheet" href="css/styles.css"> 
    <style>
        :root {
            --primary-color: #e63946; /* Rosso Sagra, personalizzalo se vuoi */
            --text-color: #1d3557;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .welcome-container {
            text-align: center;
            max-width: 450px;
            width: 100%;
            padding: 30px 20px;
            box-sizing: border-box;
        }

        .logo-container img {
            max-width: 180px;
            height: auto;
            margin-bottom: 15px;
            border-radius: 50%;
            /* Sfrutta il logo300.png presente nella tua cartella img */
        }

        h1 {
            font-size: 2.2rem;
            margin-bottom: 5px;
            color: #1d3557;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #6c757d;
            margin-bottom: 35px;
        }

        .buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .btn-welcome {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 25px;
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            color: white;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }

        /* Colori e stili personalizzati per ogni pulsante */
        .btn-menu {
            background: linear-gradient(135deg, #e63946, #d90429);
        }
        
        .btn-locandina {
            background: linear-gradient(135deg, #4a4e69, #22223b);
        }

        .btn-allergeni {
            background: linear-gradient(135deg, #f4a261, #e76f51);
        }

        /* Effetto al passaggio del mouse / tocco */
        .btn-welcome:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
        }

        .btn-welcome:active {
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #adb5bd;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        
        <!-- Logo della sagra (puntiamo a logo300.png che hai nella cartella img) -->
        <div class="logo-container">
            <img src="img/logo300.png" alt="Logo Sagra">
        </div>

        <h1>Benvenuti alla Sagra!</h1>
        <p class="subtitle">Scegli un'opzione per continuare</p>

        <!-- Griglia dei 3 Pulsanti -->
        <div class="buttons-grid">
            
            <a href="ordini.html" class="btn-welcome btn-ordini">
                🍽️ Guarda il Menu & Ordina
            </a>

            <a href="locandina.html" class="btn-welcome btn-locandina">
                📅 Locandina dell'Evento
            </a>

            <a href="allergeni.html" class="btn-welcome btn-allergeni">
                ⚠️ Info & Allergeni
            </a>
            
        </div>

        <div class="footer-text">
            © 2026 - Tutti i diritti riservati
        </div>
    </div>

</body>
</html>
